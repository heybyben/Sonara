name: Debug CI

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - '*' # run debug build for all branches
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check pull request mergeability
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            if (pr.data.mergeable === false || pr.data.mergeable_state === 'dirty') {
              core.setFailed('Pull request has merge conflicts. Please resolve conflicts before continuing.');
            }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sonara-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          compression-level: 0
          if-no-files-found: error

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT: ${{ job.status }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured. Skipping notification."
            exit 0
          fi

          status="${RESULT^^}"
          message="<b>Sonara Debug CI</b>%0AStatus: ${status}%0ARepo: $GITHUB_REPOSITORY%0ARef: $GITHUB_REF%0ARun: $GITHUB_RUN_NUMBER%0AURL: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${message}" \
            -d parse_mode=HTML

      - name: Upload debug APK to Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured. Skipping artifact upload."
            exit 0
          fi

          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "No debug APK found at $APK_PATH. Skipping upload."
            exit 0
          fi

          ZIP_NAME="sonara-debug-${GITHUB_RUN_NUMBER}.zip"
          ZIP_PATH="${PWD}/${ZIP_NAME}"
          zip -j "$ZIP_PATH" "$APK_PATH"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "Zip creation failed: $ZIP_PATH not found"
            exit 1
          fi

          echo "Created ZIP: $ZIP_PATH"
          ls -l "$ZIP_PATH"
          echo "Uploading $ZIP_PATH to Telegram"
          caption="<b>Sonara Debug CI</b>%0AStatus: ${RESULT^^}%0ARepo: $GITHUB_REPOSITORY%0ARef: $GITHUB_REF%0ARun: $GITHUB_RUN_NUMBER"
          curl --silent --show-error --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"${ZIP_PATH}" \
            -F caption="${caption}" \
            -F parse_mode=HTML
